<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary History</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="history-root">

    <!-- Sticky header -->
    <header class="history-header">
      <span class="history-header-title">History</span>
      <button id="clearHistoryBtn" class="btn btn-danger btn-sm" aria-label="Clear all history">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Clear all
      </button>
    </header>

    <!-- Search bar -->
    <div class="history-search-bar">
      <div class="history-search-wrap">
        <svg class="history-search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="historySearch" type="search" class="history-search-input"
               placeholder="Search summaries…"
               aria-label="Search summaries" autocomplete="off">
      </div>
    </div>

    <!-- Card list -->
    <main>
      <div id="historyList" class="history-list" role="list" aria-label="Summary history">
        <!-- Cards rendered by JS -->
      </div>
    </main>

  </div>

  <div id="notification" class="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <script type="module" src="history.js"></script>
</body>
</html>
